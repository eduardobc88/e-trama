services:
  fractal-engine-ai-dashboard:
    container_name: fractal-engine-ai-dashboard
    image: fractal-engine-ai-node-img:latest
    restart: always
    volumes:
      - ../../dashboard/:/dashboard/
      - ../../service/:/service/
      - ../../static/:/static/
    working_dir: /dashboard/fractal-engine-ai/
    command: npm run development
    tty: true
    depends_on:
      - fractal-engine-ai-service
  fractal-engine-ai-db-service:
    image: fractal-engine-ai-mysql-img
    restart: always
    hostname: fractal-engine-ai-db-service
    container_name: fractal-engine-ai-db-service
    networks:
      - fractal-engine-ai-network
    ports:
      - "3306:3306"
    volumes:
      - fractal-engine-ai-db:/var/lib/mysql/
    environment:
      MYSQL_ROOT_PASSWORD: fractalengineai2026
      MYSQL_DATABASE: fractal-engine-ai
      TZ: America/Mexico_City
    command:
      --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    tty: true
  fractal-engine-ai-proxy-service:
    image: fractal-engine-ai-nginx-img
    restart: always
    hostname: fractal-engine-ai-proxy-service
    container_name: fractal-engine-ai-proxy-service
    networks:
      - fractal-engine-ai-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../static/:/static/
      - ../../upload/:/upload/
      - ../../docs/vue-mc:/vue-mc/
      - ../../service/fractal-engine-ai-proxy/:/fractal-engine-ai-proxy-service/
      - ../../service/fractal-engine-ai-proxy/development/nginx.conf:/etc/nginx/nginx.conf
    working_dir: /fractal-engine-ai-proxy-service/
    depends_on:
      - fractal-engine-ai-service
    command: [nginx-debug, '-g', 'daemon off;']
    tty: true
  fractal-engine-ai-service:
    image: fractal-engine-ai-node-img:latest
    restart: always
    hostname: fractal-engine-ai-service
    container_name: fractal-engine-ai-service
    networks:
      - fractal-engine-ai-network
    volumes:
      - ../../service/fractal-engine-ai/:/fractal-engine-ai-service/
      - ../../static/dashboard/fractal-engine-ai/:/fractal-engine-ai-static/
      - ../../upload/:/upload/
    working_dir: /fractal-engine-ai-service/
    environment:
      - NODE_ENV=development
    env_file:
      - ./environment-vars.env
    command: pm2-runtime start ecosystem.config.js --watch --env development && pm2-runtime logs
    depends_on:
      - fractal-engine-ai-db-service
    tty: true
  fractal-engine-ai-notification-service:
    image: fractal-engine-ai-node-img:latest
    restart: always
    hostname: fractal-engine-ai-notification-service
    container_name: fractal-engine-ai-notification-service
    networks:
      - fractal-engine-ai-network
    volumes:
      - ../../service/fractal-engine-ai-notification/:/fractal-engine-ai-notification-service/
    working_dir: /fractal-engine-ai-notification-service/
    env_file:
      - environment-vars.env
    command: pm2-runtime start ecosystem.config.js --watch --env development && pm2-runtime logs
    depends_on:
      - fractal-engine-ai-db-service
    tty: true

volumes:
  fractal-engine-ai-db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/database

networks:
  fractal-engine-ai-network:
    name: fractal-engine-ai-network
    ipam:
      driver: default
      config:
        - subnet: 192.168.1.0/24
