worker_processes  1;

events {
    worker_connections  1024;
}

http {
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
  '$status $body_bytes_sent "$http_referer" '
  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /fractal-engine-ai-proxy-service/development.log  main;

  sendfile            on;
  tcp_nopush          on;
  tcp_nodelay         on;
  keepalive_timeout   165;
  types_hash_max_size 2048;
  client_max_body_size 30M;

  include             /etc/nginx/mime.types;

  server {
    listen 80;
    server_name                     192.168.2.245;
    add_header                      X-Frame-Options SAMEORIGIN;
    add_header                      X-Content-Type-Options nosniff;
    add_header                      X-XSS-Protection "1; mode=block";

    # == start https ==
    listen          443 ssl;
    listen          [::]:443 ssl;
    ssl_certificate "/fractal-engine-ai-proxy-service/ssl/ssl.crt";
    ssl_certificate_key "/fractal-engine-ai-proxy-service/ssl/ssl.key";
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout  20m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    # == end https ==

    location / {
      proxy_http_version      1.1;
      proxy_pass              http://fractal-engine-ai-service;
      # proxy_read_timeout    90;
      proxy_redirect          http://fractal-engine-ai-service fractalengine.io;
      proxy_set_header        Host $host;
      proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;
      proxy_set_header        X-Real-IP $remote_addr;
      proxy_set_header        Connection 'upgrade';
      proxy_set_header        Upgrade $http_upgrade;
    }

    location /notification-service {
      proxy_pass http://fractal-engine-ai-notification-service;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
      proxy_redirect off;
      proxy_pass_header Server;
    }

    location /static {
      root /;
      autoindex on;
    }
    location /upload {
      root /;
      autoindex on;
    }
    location /vue-mc {
      root /;
      autoindex on;
    }
  }
}
